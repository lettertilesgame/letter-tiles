<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Tiles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060c1a;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }

    #f {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: none;
      z-index: 200;
      pointer-events: none;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: rgba(6, 12, 26, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(79, 172, 254, 0.12);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #64748b;
    }

    #score {
      flex: 0 0 auto;
      color: #94a3b8;
    }

    #progress-bar-wrap {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4facfe, #a78bfa);
      border-radius: 2px;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(79, 172, 254, 0.45);
    }

    /* ── Start / Menu Screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 24px;
      background:
        radial-gradient(ellipse 60% 40% at 50% -10%, rgba(79, 172, 254, 0.1) 0%, transparent 70%),
        #060c1a;
    }

    #start-screen h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 45%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #subtitle {
      font-size: 0.875rem;
      color: #475569;
      text-align: center;
      max-width: 340px;
      line-height: 1.5;
    }

    #hint {
      font-size: 0.75rem;
      color: #334155;
      text-align: center;
      max-width: 400px;
      line-height: 1.5;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 22px;
      border-radius: 10px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.01em;
      border: 1px solid transparent;
    }
    button:active { transform: scale(0.97); }

    #modeLearnBtn {
      background: linear-gradient(135deg, #1a3a6b, #2563eb);
      border-color: rgba(79, 172, 254, 0.3);
      color: #bfdbfe;
    }
    #modeLearnBtn:hover {
      background: linear-gradient(135deg, #1e4a8a, #3b7eff);
      border-color: rgba(79, 172, 254, 0.55);
      box-shadow: 0 4px 20px rgba(79, 172, 254, 0.22);
      transform: translateY(-1px);
    }

    #modeFreeBtn {
      background: linear-gradient(135deg, #2d1660, #7c3aed);
      border-color: rgba(167, 139, 250, 0.3);
      color: #ddd6fe;
    }
    #modeFreeBtn:hover {
      background: linear-gradient(135deg, #3a1e80, #8b5cf6);
      border-color: rgba(167, 139, 250, 0.55);
      box-shadow: 0 4px 20px rgba(167, 139, 250, 0.22);
      transform: translateY(-1px);
    }

    #playBtn { display: none; }

    #backToMenuBtn {
      display: none;
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
      color: #475569;
    }
    #backToMenuBtn:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.14);
      transform: none;
      box-shadow: none;
      color: #64748b;
    }

    /* ── Level List ── */
    #levelList {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 480px;
      max-height: 56vh;
      overflow-y: auto;
      padding: 2px 4px;
    }

    #levelList::-webkit-scrollbar { width: 3px; }
    #levelList::-webkit-scrollbar-track { background: transparent; }
    #levelList::-webkit-scrollbar-thumb {
      background: rgba(79, 172, 254, 0.25);
      border-radius: 2px;
    }

    /* ── Duolingo-style lesson path ── */
    .lesson-section {
      position: relative;
      width: 100%;
      padding: 12px 14px 14px;
      border-radius: 14px;
      background: rgba(13, 27, 62, 0.55);
      border: 1px solid color-mix(in srgb, var(--lesson-color) 18%, transparent);
      box-shadow: inset 3px 0 0 var(--lesson-color);
    }
    .lesson-section.locked { opacity: 0.55; }
    .lesson-section.done {
      background: color-mix(in srgb, var(--lesson-color) 8%, rgba(13,27,62,0.55));
    }

    .lesson-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .lesson-dot {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--lesson-color);
      background: color-mix(in srgb, var(--lesson-color) 16%, transparent);
      border: 1.5px solid color-mix(in srgb, var(--lesson-color) 55%, transparent);
      box-shadow: 0 0 14px color-mix(in srgb, var(--lesson-color) 30%, transparent);
    }
    .lesson-section.done .lesson-dot {
      color: #061018;
      background: var(--lesson-color);
    }
    .lesson-text { flex: 1 1 auto; min-width: 0; text-align: left; }
    .lesson-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.92rem;
      color: #e2e8f0;
      line-height: 1.2;
    }
    .lesson-sub {
      font-size: 0.74rem;
      color: #7c8ba5;
      margin-top: 2px;
    }
    .lesson-count {
      flex: 0 0 auto;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--lesson-color);
      background: color-mix(in srgb, var(--lesson-color) 12%, transparent);
      padding: 3px 9px;
      border-radius: 999px;
    }

    .lesson-levels {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-left: 46px;
    }
    .level-node {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 12px;
      font-size: 0.82rem;
      text-align: left;
      border-radius: 9px;
      background: rgba(8, 16, 36, 0.6);
      border: 1px solid color-mix(in srgb, var(--lesson-color) 14%, transparent);
      color: #cbd5e1;
    }
    .level-node:hover {
      background: color-mix(in srgb, var(--lesson-color) 12%, rgba(8,16,36,0.6));
      border-color: color-mix(in srgb, var(--lesson-color) 45%, transparent);
      box-shadow: 0 2px 14px color-mix(in srgb, var(--lesson-color) 18%, transparent);
      transform: none;
    }
    .node-num {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--lesson-color);
      background: color-mix(in srgb, var(--lesson-color) 14%, transparent);
    }
    .node-label { flex: 1 1 auto; min-width: 0; }

    .level-node.current {
      border-color: color-mix(in srgb, var(--lesson-color) 60%, transparent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--lesson-color) 35%, transparent),
                  0 4px 18px color-mix(in srgb, var(--lesson-color) 22%, transparent);
    }
    .level-node.done { color: #6ee7b7; }
    .level-node.done .node-num {
      color: #061018;
      background: #06ffa5;
    }
    .level-node.locked {
      background: rgba(8, 14, 30, 0.4);
      border-color: rgba(255,255,255,0.04);
      color: #334155;
      cursor: default;
    }
    .level-node.locked:hover {
      background: rgba(8, 14, 30, 0.4);
      box-shadow: none;
      border-color: rgba(255,255,255,0.04);
      transform: none;
      color: #334155;
    }
    .level-node.locked .node-num {
      color: #334155;
      background: rgba(255,255,255,0.03);
    }

    /* ── Game Over Overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(6, 12, 26, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    #finalText {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b6b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #restart-btn {
      background: rgba(255, 107, 107, 0.1);
      border-color: rgba(255, 107, 107, 0.28);
      color: #fca5a5;
    }
    #restart-btn:hover {
      background: rgba(255, 107, 107, 0.18);
      border-color: rgba(255, 107, 107, 0.5);
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.18);
      transform: translateY(-1px);
    }

    /* ── Feedback Overlay (Lernmodus) ── */
    #feedback-overlay {
      position: fixed;
      inset: 0;
      z-index: 550;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(6, 12, 26, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .feedback-card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 28px 26px;
      border-radius: 18px;
      background: rgba(13, 24, 56, 0.85);
      border: 1px solid rgba(79, 172, 254, 0.18);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    #fb-title {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    #feedback-overlay.passed #fb-title {
      background: linear-gradient(135deg, #06ffa5, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #feedback-overlay.failed #fb-title {
      background: linear-gradient(135deg, #ff6b6b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #fb-subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: -8px;
    }

    #fb-criteria {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #fb-criteria li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.9rem;
    }
    #fb-criteria .fb-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: 700;
      flex: 0 0 auto;
    }
    #fb-criteria li.ok .fb-icon {
      background: rgba(6, 255, 165, 0.15);
      color: #06ffa5;
    }
    #fb-criteria li.fail .fb-icon {
      background: rgba(255, 107, 107, 0.15);
      color: #ff6b6b;
    }
    #fb-criteria .fb-label {
      flex: 1;
      color: #cbd5e1;
      font-weight: 500;
    }
    #fb-criteria .fb-val {
      font-variant-numeric: tabular-nums;
      color: #94a3b8;
    }
    #fb-criteria li.fail .fb-val { color: #fca5a5; }
    #fb-criteria li.ok .fb-val { color: #6ee7b7; }

    #fb-tip {
      font-size: 0.85rem;
      line-height: 1.55;
      color: #94a3b8;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(79, 172, 254, 0.06);
      border-left: 3px solid rgba(79, 172, 254, 0.5);
    }

    #feedback-overlay .btn-row { margin-top: 4px; }

    #fb-retry {
      background: linear-gradient(135deg, #1a3a6b, #2563eb);
      border-color: rgba(79, 172, 254, 0.35);
      color: #bfdbfe;
    }
    #fb-retry:hover {
      background: linear-gradient(135deg, #1e4a8a, #3b7eff);
      border-color: rgba(79, 172, 254, 0.6);
      box-shadow: 0 4px 20px rgba(79, 172, 254, 0.22);
      transform: translateY(-1px);
    }
    #fb-next {
      background: linear-gradient(135deg, #0f3d2e, #06b97a);
      border-color: rgba(6, 255, 165, 0.35);
      color: #a7f3d0;
    }
    #fb-next:hover {
      background: linear-gradient(135deg, #14523d, #08d98f);
      border-color: rgba(6, 255, 165, 0.6);
      box-shadow: 0 4px 20px rgba(6, 255, 165, 0.2);
      transform: translateY(-1px);
    }
    #fb-menu {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
      color: #64748b;
    }
    #fb-menu:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.14);
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <!-- Game canvas (background) -->
  <canvas id="game"></canvas>
  <!-- Level progress overlay canvas -->
  <canvas id="f"></canvas>

  <!-- HUD -->
  <div id="hud">
    <span id="score">Punkte: 0 | Level: 1</span>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <!-- Start / menu screen -->
  <div id="start-screen">
    <h1>Letter Tiles</h1>
    <p id="subtitle">Wähle Modus: Lernpfad (Level) oder Freier Modus.</p>

    <div class="btn-row">
      <button id="modeLearnBtn">Lernpfad</button>
      <button id="modeFreeBtn">Freier Modus</button>
      <!-- legacy play button kept in DOM, hidden by JS -->
      <button id="playBtn">Spielen</button>
    </div>

    <div id="levelList"></div>

    <button id="backToMenuBtn">← Zurück</button>

    <p id="hint"></p>
  </div>

  <!-- Game-over overlay -->
  <div id="overlay">
    <p id="finalText">Deine Punkte: 0</p>
    <button id="restart-btn">Zurück zum Menü</button>
  </div>

  <!-- Learning-mode feedback overlay -->
  <div id="feedback-overlay">
    <div class="feedback-card">
      <h2 id="fb-title">Nicht bestanden</h2>
      <p id="fb-subtitle">Level</p>
      <ul id="fb-criteria"></ul>
      <p id="fb-tip"></p>
      <div class="btn-row">
        <button id="fb-retry">Nochmal versuchen</button>
        <button id="fb-next">Weiter</button>
        <button id="fb-menu">Zum Menü</button>
      </div>
    </div>
  </div>

  <script src="game_touchtyping.js"></script>
</body>
</html>
