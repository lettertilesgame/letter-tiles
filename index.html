<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Tiles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060c1a;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }

    #f {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: none;
      z-index: 200;
      pointer-events: none;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: rgba(6, 12, 26, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(79, 172, 254, 0.12);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #64748b;
    }

    #score {
      flex: 0 0 auto;
      color: #94a3b8;
    }

    #progress-bar-wrap {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4facfe, #a78bfa);
      border-radius: 2px;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(79, 172, 254, 0.45);
    }

    /* ── Start / Menu Screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 24px;
      background:
        radial-gradient(ellipse 60% 40% at 50% -10%, rgba(79, 172, 254, 0.1) 0%, transparent 70%),
        #060c1a;
    }

    #start-screen h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 45%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #subtitle {
      font-size: 0.875rem;
      color: #475569;
      text-align: center;
      max-width: 340px;
      line-height: 1.5;
    }

    #hint {
      font-size: 0.75rem;
      color: #334155;
      text-align: center;
      max-width: 400px;
      line-height: 1.5;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 22px;
      border-radius: 10px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.01em;
      border: 1px solid transparent;
    }
    button:active { transform: scale(0.97); }

    #modeLearnBtn {
      background: linear-gradient(135deg, #1a3a6b, #2563eb);
      border-color: rgba(79, 172, 254, 0.3);
      color: #bfdbfe;
    }
    #modeLearnBtn:hover {
      background: linear-gradient(135deg, #1e4a8a, #3b7eff);
      border-color: rgba(79, 172, 254, 0.55);
      box-shadow: 0 4px 20px rgba(79, 172, 254, 0.22);
      transform: translateY(-1px);
    }

    #modeFreeBtn {
      background: linear-gradient(135deg, #2d1660, #7c3aed);
      border-color: rgba(167, 139, 250, 0.3);
      color: #ddd6fe;
    }
    #modeFreeBtn:hover {
      background: linear-gradient(135deg, #3a1e80, #8b5cf6);
      border-color: rgba(167, 139, 250, 0.55);
      box-shadow: 0 4px 20px rgba(167, 139, 250, 0.22);
      transform: translateY(-1px);
    }

    #playBtn { display: none; }

    #backToMenuBtn {
      display: none;
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
      color: #475569;
    }
    #backToMenuBtn:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.14);
      transform: none;
      box-shadow: none;
      color: #64748b;
    }

    /* ── Level List ── */
    #levelList {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 480px;
      max-height: 56vh;
      overflow-y: auto;
      padding: 2px 4px;
    }

    #levelList::-webkit-scrollbar { width: 3px; }
    #levelList::-webkit-scrollbar-track { background: transparent; }
    #levelList::-webkit-scrollbar-thumb {
      background: rgba(79, 172, 254, 0.25);
      border-radius: 2px;
    }

    /* ── Duolingo-style lesson path ── */
    .lesson-section {
      position: relative;
      width: 100%;
      padding: 12px 14px 14px;
      border-radius: 14px;
      background: rgba(13, 27, 62, 0.55);
      border: 1px solid color-mix(in srgb, var(--lesson-color) 18%, transparent);
      box-shadow: inset 3px 0 0 var(--lesson-color);
    }
    .lesson-section.locked { opacity: 0.55; }
    .lesson-section.done {
      background: color-mix(in srgb, var(--lesson-color) 8%, rgba(13,27,62,0.55));
    }

    .lesson-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .lesson-dot {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--lesson-color);
      background: color-mix(in srgb, var(--lesson-color) 16%, transparent);
      border: 1.5px solid color-mix(in srgb, var(--lesson-color) 55%, transparent);
      box-shadow: 0 0 14px color-mix(in srgb, var(--lesson-color) 30%, transparent);
    }
    .lesson-section.done .lesson-dot {
      color: #061018;
      background: var(--lesson-color);
    }
    .lesson-text { flex: 1 1 auto; min-width: 0; text-align: left; }
    .lesson-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.92rem;
      color: #e2e8f0;
      line-height: 1.2;
    }
    .lesson-sub {
      font-size: 0.74rem;
      color: #7c8ba5;
      margin-top: 2px;
    }
    .lesson-count {
      flex: 0 0 auto;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--lesson-color);
      background: color-mix(in srgb, var(--lesson-color) 12%, transparent);
      padding: 3px 9px;
      border-radius: 999px;
    }

    .lesson-levels {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-left: 46px;
    }
    .level-node {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 12px;
      font-size: 0.82rem;
      text-align: left;
      border-radius: 9px;
      background: rgba(8, 16, 36, 0.6);
      border: 1px solid color-mix(in srgb, var(--lesson-color) 14%, transparent);
      color: #cbd5e1;
    }
    .level-node:hover {
      background: color-mix(in srgb, var(--lesson-color) 12%, rgba(8,16,36,0.6));
      border-color: color-mix(in srgb, var(--lesson-color) 45%, transparent);
      box-shadow: 0 2px 14px color-mix(in srgb, var(--lesson-color) 18%, transparent);
      transform: none;
    }
    .node-num {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--lesson-color);
      background: color-mix(in srgb, var(--lesson-color) 14%, transparent);
    }
    .node-label { flex: 1 1 auto; min-width: 0; }

    .level-node.current {
      border-color: color-mix(in srgb, var(--lesson-color) 60%, transparent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--lesson-color) 35%, transparent),
                  0 4px 18px color-mix(in srgb, var(--lesson-color) 22%, transparent);
    }
    .level-node.done { color: #6ee7b7; }
    .level-node.done .node-num {
      color: #061018;
      background: #06ffa5;
    }
    .level-node.locked {
      background: rgba(8, 14, 30, 0.4);
      border-color: rgba(255,255,255,0.04);
      color: #334155;
      cursor: default;
    }
    .level-node.locked:hover {
      background: rgba(8, 14, 30, 0.4);
      box-shadow: none;
      border-color: rgba(255,255,255,0.04);
      transform: none;
      color: #334155;
    }
    .level-node.locked .node-num {
      color: #334155;
      background: rgba(255,255,255,0.03);
    }

    /* ── Game Over Overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(6, 12, 26, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    #finalText {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b6b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #restart-btn {
      background: rgba(255, 107, 107, 0.1);
      border-color: rgba(255, 107, 107, 0.28);
      color: #fca5a5;
    }
    #restart-btn:hover {
      background: rgba(255, 107, 107, 0.18);
      border-color: rgba(255, 107, 107, 0.5);
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.18);
      transform: translateY(-1px);
    }

    /* ── Feedback Overlay (Lernmodus) ── */
    #feedback-overlay {
      position: fixed;
      inset: 0;
      z-index: 550;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(6, 12, 26, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .feedback-card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 28px 26px;
      border-radius: 18px;
      background: rgba(13, 24, 56, 0.85);
      border: 1px solid rgba(79, 172, 254, 0.18);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    #fb-title {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    #feedback-overlay.passed #fb-title {
      background: linear-gradient(135deg, #06ffa5, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #feedback-overlay.failed #fb-title {
      background: linear-gradient(135deg, #ff6b6b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #fb-subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: -8px;
    }

    #fb-criteria {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #fb-criteria li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.9rem;
    }
    #fb-criteria .fb-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: 700;
      flex: 0 0 auto;
    }
    #fb-criteria li.ok .fb-icon {
      background: rgba(6, 255, 165, 0.15);
      color: #06ffa5;
    }
    #fb-criteria li.fail .fb-icon {
      background: rgba(255, 107, 107, 0.15);
      color: #ff6b6b;
    }
    #fb-criteria .fb-label {
      flex: 1;
      color: #cbd5e1;
      font-weight: 500;
    }
    #fb-criteria .fb-val {
      font-variant-numeric: tabular-nums;
      color: #94a3b8;
    }
    #fb-criteria li.fail .fb-val { color: #fca5a5; }
    #fb-criteria li.ok .fb-val { color: #6ee7b7; }

    #fb-tip {
      font-size: 0.85rem;
      line-height: 1.55;
      color: #94a3b8;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(79, 172, 254, 0.06);
      border-left: 3px solid rgba(79, 172, 254, 0.5);
    }

    #feedback-overlay .btn-row { margin-top: 4px; }

    #fb-retry {
      background: linear-gradient(135deg, #1a3a6b, #2563eb);
      border-color: rgba(79, 172, 254, 0.35);
      color: #bfdbfe;
    }
    #fb-retry:hover {
      background: linear-gradient(135deg, #1e4a8a, #3b7eff);
      border-color: rgba(79, 172, 254, 0.6);
      box-shadow: 0 4px 20px rgba(79, 172, 254, 0.22);
      transform: translateY(-1px);
    }
    #fb-next {
      background: linear-gradient(135deg, #0f3d2e, #06b97a);
      border-color: rgba(6, 255, 165, 0.35);
      color: #a7f3d0;
    }
    #fb-next:hover {
      background: linear-gradient(135deg, #14523d, #08d98f);
      border-color: rgba(6, 255, 165, 0.6);
      box-shadow: 0 4px 20px rgba(6, 255, 165, 0.2);
      transform: translateY(-1px);
    }
    #fb-menu {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
      color: #64748b;
    }
    #fb-menu:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.14);
      color: #94a3b8;
    }

    /* ════════════ Tippy the typing tiger + Duolingo polish ════════════ */

    /* chunky "3D" action buttons (Duolingo-style) */
    #modeLearnBtn, #modeFreeBtn, #intro-start, #fb-next, #fb-retry {
      border-radius: 14px;
      padding: 13px 26px;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 0 rgba(0,0,0,0.35);
    }
    #modeLearnBtn:active, #modeFreeBtn:active,
    #intro-start:active, #fb-next:active, #fb-retry:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.35);
    }

    /* ── Tippy mascot ── */
    .tippy-svg { width: 100%; height: 100%; display: block;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.35)); }
    @keyframes tippyBob {
      0%, 100% { transform: translateY(0) rotate(-1.5deg); }
      50%      { transform: translateY(-7px) rotate(1.5deg); }
    }
    .tippy-bob { animation: tippyBob 2.6s ease-in-out infinite; transform-origin: center bottom; }

    /* Menu hero: Tippy + speech bubble */
    #tippy-hero {
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 460px;
      margin-bottom: -4px;
    }
    #tippy-hero .tippy-figure { flex: 0 0 auto; width: 92px; height: 92px; }
    .tippy-bubble {
      position: relative;
      background: #fff7ea;
      color: #3b2a1d;
      font-size: 0.9rem;
      line-height: 1.45;
      padding: 12px 15px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    .tippy-bubble b { color: #f5821f; }
    .tippy-bubble::before {
      content: "";
      position: absolute;
      left: -9px;
      top: 50%;
      transform: translateY(-50%);
      border-width: 8px 10px 8px 0;
      border-style: solid;
      border-color: transparent #fff7ea transparent transparent;
    }

    /* ── Level intro overlay ── */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 560;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(6, 12, 26, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .intro-card {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 30px 26px;
      border-radius: 20px;
      background: rgba(13, 24, 56, 0.92);
      border: 1px solid color-mix(in srgb, var(--lesson-color, #4facfe) 40%, transparent);
      box-shadow: 0 24px 70px rgba(0,0,0,0.5),
                  inset 0 0 0 1px color-mix(in srgb, var(--lesson-color, #4facfe) 12%, transparent);
    }
    #intro-tippy { width: 110px; height: 110px; flex: 0 0 auto; }
    .intro-bubble { text-align: center; }
    #intro-lesson {
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--lesson-color, #4facfe);
      background: color-mix(in srgb, var(--lesson-color, #4facfe) 14%, transparent);
      padding: 4px 11px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    #intro-title {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.02em;
    }
    #intro-text {
      font-size: 0.92rem;
      line-height: 1.6;
      color: #cbd5e1;
      margin-top: 8px;
      max-width: 340px;
    }
    #intro-start {
      background: var(--lesson-color, #4facfe);
      color: #0a1022;
      border-color: transparent;
    }
    #intro-start:hover { filter: brightness(1.08); transform: translateY(-1px); }
    #intro-back {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
      color: #64748b;
    }
    #intro-back:hover { background: rgba(255,255,255,0.07); color: #94a3b8; }

    /* ── Tippy in feedback overlay ── */
    #fb-tippy {
      width: 96px;
      height: 96px;
      align-self: center;
      margin-bottom: -4px;
    }

    /* ── Tippy peeking on the active lesson ── */
    .lesson-tippy { flex: 0 0 auto; width: 40px; height: 40px; }
    .lesson-section.active {
      box-shadow: inset 4px 0 0 var(--lesson-color),
                  0 6px 22px color-mix(in srgb, var(--lesson-color) 22%, transparent);
    }

    /* ── Chunkier circular level nodes ── */
    .node-num {
      width: 30px;
      height: 30px;
      font-size: 0.85rem;
      box-shadow: 0 2px 0 color-mix(in srgb, var(--lesson-color) 35%, rgba(0,0,0,0.4));
    }
    .level-node {
      padding: 11px 14px;
      border-radius: 12px;
    }
    .level-node.current .node-num {
      background: var(--lesson-color);
      color: #0a1022;
    }

    /* ════════════ Lesson pager (one page per Lektion) ════════════ */
    .pager-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 480px;
    }
    .pager-arrow {
      flex: 0 0 auto;
      width: 38px; height: 38px;
      padding: 0;
      border-radius: 50%;
      font-size: 22px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #cbd5e1;
    }
    .pager-arrow:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: #fff; }
    .pager-arrow:disabled { opacity: 0.3; cursor: default; }
    .pager-dots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      flex: 1 1 auto;
    }
    .pager-dot {
      width: 27px; height: 27px;
      padding: 0;
      border-radius: 50%;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      color: var(--lesson-color);
      background: color-mix(in srgb, var(--lesson-color) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--lesson-color) 32%, transparent);
    }
    .pager-dot:hover { filter: brightness(1.15); }
    .pager-dot.active { transform: scale(1.14); box-shadow: 0 0 0 2px color-mix(in srgb, var(--lesson-color) 70%, transparent); }
    .pager-dot.done { background: var(--lesson-color); color: #0a1022; }
    .pager-dot.locked {
      color: #64748b;
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.07);
      font-size: 0.62rem;
    }

    /* ── single lesson page ── */
    .lesson-page {
      width: 100%;
      max-width: 480px;
      border-radius: 18px;
      padding: 18px 18px 28px;
      background: rgba(13, 27, 62, 0.55);
      border: 1px solid color-mix(in srgb, var(--lesson-color) 24%, transparent);
      box-shadow: inset 0 3px 0 var(--lesson-color),
                  0 8px 30px color-mix(in srgb, var(--lesson-color) 14%, transparent);
    }
    .lesson-page.locked { opacity: 0.92; }

    .lesson-page-head {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 14px;
    }
    .lesson-page-badge {
      flex: 0 0 auto;
      width: 46px; height: 46px;
      border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 1.3rem;
      color: #0a1022;
      background: var(--lesson-color);
      box-shadow: 0 4px 0 color-mix(in srgb, var(--lesson-color) 45%, rgba(0,0,0,0.5));
    }
    .lesson-page.locked .lesson-page-badge {
      color: var(--lesson-color);
      background: color-mix(in srgb, var(--lesson-color) 16%, transparent);
      box-shadow: none;
    }
    .lesson-page-text { flex: 1 1 auto; min-width: 0; text-align: left; }
    .lesson-page-kicker {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--lesson-color);
    }
    .lesson-page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem; font-weight: 700;
      color: #f1f5f9; line-height: 1.15; margin-top: 2px;
    }
    .lesson-page-sub { font-size: 0.8rem; color: #8aa0bf; margin-top: 3px; }
    .lesson-page-tippy { flex: 0 0 auto; width: 46px; height: 46px; }

    .lesson-lock-banner {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 0.78rem; line-height: 1.45;
      color: #cbd5e1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 6px;
    }
    .lesson-lock-banner .lock-ico { font-size: 1rem; line-height: 1.3; }

    /* ── winding level path ── */
    .lesson-path {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-top: 10px;
    }
    .path-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: auto;
      padding: 0;
      background: none;
      border: none;
    }
    .path-node:active { transform: none; }
    .path-node:nth-child(odd)  { transform: translateX(-44px); }
    .path-node:nth-child(even) { transform: translateX(44px); }
    .node-circle {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 1.4rem;
      color: #0a1022;
      background: var(--lesson-color);
      box-shadow: 0 5px 0 color-mix(in srgb, var(--lesson-color) 45%, rgba(0,0,0,0.55)),
                  0 9px 18px color-mix(in srgb, var(--lesson-color) 28%, transparent);
      transition: filter 0.12s ease, transform 0.12s ease;
    }
    .path-node:hover:not(:disabled) .node-circle { filter: brightness(1.08); }
    .path-node:active:not(:disabled) .node-circle {
      transform: translateY(4px);
      box-shadow: 0 1px 0 color-mix(in srgb, var(--lesson-color) 45%, rgba(0,0,0,0.55));
    }
    .path-node.done .node-circle {
      background: #06ffa5;
      box-shadow: 0 5px 0 #06996a, 0 9px 18px rgba(6,255,165,0.25);
    }
    .path-node.locked { cursor: default; }
    .path-node.locked .node-circle {
      background: rgba(255,255,255,0.06);
      color: #475569;
      box-shadow: 0 5px 0 rgba(0,0,0,0.35);
    }
    .path-node.current .node-circle { animation: nodePulse 1.8s ease-in-out infinite; }
    @keyframes nodePulse {
      0%, 100% { box-shadow: 0 0 0 4px color-mix(in srgb, var(--lesson-color) 28%, transparent),
                             0 5px 0 color-mix(in srgb, var(--lesson-color) 45%, rgba(0,0,0,0.55)); }
      50%      { box-shadow: 0 0 0 9px color-mix(in srgb, var(--lesson-color) 10%, transparent),
                             0 5px 0 color-mix(in srgb, var(--lesson-color) 45%, rgba(0,0,0,0.55)); }
    }
    .node-cap {
      font-size: 0.74rem;
      color: #cbd5e1;
      max-width: 150px;
      text-align: center;
      line-height: 1.25;
    }
    .path-node.locked .node-cap { color: #475569; }
    .node-start {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.1em;
      color: #0a1022;
      background: var(--lesson-color);
      padding: 2px 9px;
      border-radius: 999px;
    }
  </style>
</head>
<body>

  <!-- Game canvas (background) -->
  <canvas id="game"></canvas>
  <!-- Level progress overlay canvas -->
  <canvas id="f"></canvas>

  <!-- HUD -->
  <div id="hud">
    <span id="score">Punkte: 0 | Level: 1</span>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <!-- Start / menu screen -->
  <div id="start-screen">
    <div id="tippy-hero"></div>
    <h1>Letter Tiles</h1>
    <p id="subtitle">Wähle Modus: Lernpfad (Level) oder Freier Modus.</p>

    <div class="btn-row">
      <button id="modeLearnBtn">Lernpfad</button>
      <button id="modeFreeBtn">Freier Modus</button>
      <!-- legacy play button kept in DOM, hidden by JS -->
      <button id="playBtn">Spielen</button>
    </div>

    <div id="levelList"></div>

    <button id="backToMenuBtn">← Zurück</button>

    <p id="hint"></p>
  </div>

  <!-- Game-over overlay -->
  <div id="overlay">
    <p id="finalText">Deine Punkte: 0</p>
    <button id="restart-btn">Zurück zum Menü</button>
  </div>

  <!-- Level intro overlay (Tippy introduces the level) -->
  <div id="intro-overlay">
    <div class="intro-card">
      <div id="intro-tippy" class="tippy-bob"></div>
      <div class="intro-bubble">
        <span id="intro-lesson"></span>
        <h2 id="intro-title"></h2>
        <p id="intro-text"></p>
      </div>
      <div class="btn-row">
        <button id="intro-start">Los geht's! 🐯</button>
        <button id="intro-back">Zurück</button>
      </div>
    </div>
  </div>

  <!-- Learning-mode feedback overlay -->
  <div id="feedback-overlay">
    <div class="feedback-card">
      <div id="fb-tippy"></div>
      <h2 id="fb-title">Nicht bestanden</h2>
      <p id="fb-subtitle">Level</p>
      <ul id="fb-criteria"></ul>
      <p id="fb-tip"></p>
      <div class="btn-row">
        <button id="fb-retry">Nochmal versuchen</button>
        <button id="fb-next">Weiter</button>
        <button id="fb-menu">Zum Menü</button>
      </div>
    </div>
  </div>

  <script src="game_touchtyping.js"></script>
</body>
</html>
